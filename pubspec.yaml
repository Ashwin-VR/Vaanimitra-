name: vanimitra
description: >
  Vanimitra — fully offline multilingual voice assistant.
  Hindi + Tamil + English. Zero cloud. Zero cost.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── LLM inference ──────────────────────────────────────────────────────
  llama_sdk: ^0.0.5

  # ── Speech recognition ─────────────────────────────────────────────────
  speech_to_text: ^7.0.0

  # ── Wake word ──────────────────────────────────────────────────────────
  porcupine_flutter: ^3.0.0

  # ── TTS (System TTS) ───────────────────────────────────────────────────
  flutter_tts: ^4.0.2

  # ── Earcon audio (chime.mp3 only) ──────────────────────────────────────
  # FIX: PDR §5 omitted this, but §10.2 uses AudioPlayer for earcon
  audioplayers: ^6.0.0

  # ── Permissions ────────────────────────────────────────────────────────
  permission_handler: ^12.0.1

  # ── File system ────────────────────────────────────────────────────────
  path_provider: ^2.1.4

  # ── SQLite cache ───────────────────────────────────────────────────────
  sqflite: ^2.3.0

  # ── Contacts import ────────────────────────────────────────────────────
  contacts_service: ^0.6.3

  # ── Key-value flags ────────────────────────────────────────────────────
  shared_preferences: ^2.2.2

  # ── Device actions ─────────────────────────────────────────────────────
  torch_light: ^1.0.0
  volume_controller: ^2.0.7
  url_launcher: ^6.2.5
  android_intent_plus: ^5.0.0

  # ── Battery ────────────────────────────────────────────────────────────
  battery_plus: ^5.0.0

  # ── State management ───────────────────────────────────────────────────
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/wake_word/
    - assets/earcon/
  # NOTE: NO assets/tts/ — System TTS needs no audio files
